services:
  - type: web
    name: sidequest
    runtime: docker
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: DEVELOPMENT_MODE
        value: "false"
      - key: DB_HOST
        fromDatabase:
          name: sidequest-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sidequest-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: sidequest-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: sidequest-db
          property: password
      - key: DB_NAME
        value: sidequest_app
      - key: APP_URL
        fromService:
          type: web
          property: url
      - key: ADMIN_URL_SECRET
        generateValue: true
      - key: SESSION_TIMEOUT
        value: "86400"

  - type: pserv
    name: sidequest-db
    env: postgres
    plan: starter
    postgresVersion: "15"
    envVars:
      - key: MYSQL_DATABASE
        value: sidequest_app
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

databases:
  - name: sidequest-db
